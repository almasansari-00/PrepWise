<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings | PrepWise</title>

    <link rel="stylesheet" href="../CSS/setting.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">PrepWise</h2>

        <ul class="nav-links">

            <li><a href="../html/dashboard.html">Dashboard</a></li>

            <li><a href="../html/questions.html">Questions</a></li>

            <li><a href="../html/quiz.html">Quiz</a></li>

            <li><a href="../html/mock-interview.html">Mock Interview</a></li>

            <li><a href="../html/profile.html">Profile</a></li>

        </ul>

    </nav>

</header>

<section class="settings">

    <div class="settings-card">

        <h1>Settings</h1>

        <div class="setting-item">

            <label for="name">Name</label>

            <input type="text" id="name" placeholder="Enter your name">

        </div>

        <div class="setting-item">

            <label for="email">Email</label>

            <input type="email" id="email" placeholder="Enter your email">

        </div>

        <div class="setting-item">

            <label for="password">Password</label>

            <input type="password" id="password" placeholder="New password">

        </div>

        <div class="setting-item toggle">

            <span>Enable Notifications</span>

            <input type="checkbox" id="notifications">

        </div>

        <div class="setting-item toggle">

            <span>Dark Mode</span>

            <input type="checkbox" id="darkMode" checked>

        </div>

        <button id="saveBtn">

            <i class="fas fa-save"></i>

            Save Changes

        </button>

        <button id="logoutBtn" class="logout">

            <i class="fas fa-right-from-bracket"></i>

            Logout

        </button>

    </div>

</section>

<div class="back-container">

    <a href="javascript:history.back()" class="back-btn">

        <i class="fas fa-arrow-left"></i>

        Back

    </a>

</div>

<script src="../JS/setting.js"></script>

</body>

</html>
