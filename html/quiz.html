<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PrepWise | Quiz</title>

    <link rel="stylesheet" href="../CSS/quiz.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header>

        <nav class="navbar">

            <h2 class="logo">PrepWise</h2>

            <ul class="nav-links">
                <li><a href="../html/dashboard.html">Dashboard</a></li>
                <li><a href="../html/questions.html">Questions</a></li>
                <li><a href="../html/profile.html">Profile</a></li>
                <li><a href="../html/interview.html">mock-interview</a></li>
            </ul>

        </nav>

    </header>

    <!-- ================= QUIZ START ================= -->

    <section class="quiz-start">

        <div class="quiz-card">

            <h1>Interview Quiz</h1>

            <p>
                Test your interview preparation skills by selecting a category,
                difficulty level and number of questions.
            </p>

            <!-- Category -->

            <label for="category">Category</label>

            <select id="category">

                <option value="HTML">HTML</option>

                <option value="CSS">CSS</option>

                <option value="JavaScript">JavaScript</option>

                <option value="React">React</option>

                <option value="DSA">DSA</option>

            </select>

            <!-- Difficulty -->

            <label for="difficulty">Difficulty</label>

            <select id="difficulty">

                <option value="Easy">Easy</option>

                <option value="Medium">Medium</option>

                <option value="Hard">Hard</option>

            </select>

            <!-- Number of Questions -->

            <label for="questionCount">Number of Questions</label>

            <select id="questionCount">

                <option value="5">5 Questions</option>

                <option value="10" selected>10 Questions</option>

                <option value="20">20 Questions</option>

            </select>

            <button id="startQuiz">
                <i class="fas fa-play"></i>
                Start Quiz
            </button>

        </div>

    </section>
    <section id="quizContainer" style="display:none;">

    <div class="quiz-card">
        <div class="quiz-top">

    <span id="questionNumber">Question 1 / 10</span>

    <span id="timer">⏱ 30</span>

</div>

<div class="progress">

    <div class="progress-bar" id="progressBar"></div>

</div>

        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="nextBtn">Next</button>

    </div>

</section>

<div class="back-container">

    <a href="javascript:history.back()" class="back-btn">

        <i class="fas fa-arrow-left"></i>

        Back

    </a>

</div>

    <script src="../JS/quiz.js"></script>

</body>

</html>
