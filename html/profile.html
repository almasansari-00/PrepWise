<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | PrepWise</title>

    <link rel="stylesheet" href="../CSS/profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">PrepWise</h2>

        <ul class="nav-links">

            <li><a href="../html/dashboard.html">Dashboard</a></li>

            <li><a href="../html/questions.html">Questions</a></li>

            <li><a href="../html/quiz.html">Quiz</a></li>

            <li><a href="../html/interview.html">Mock Interview</a></li>

            <li>

         <a href="../html/profile.html">

          <i class="fas fa-user-circle"></i>

           Profile

         </a>

</li>

        </ul>

    </nav>

</header>

<section class="profile">

    <div class="profile-card">

        <img src="https://via.placeholder.com/150" alt="Profile">

        <h2 id="userName">Almas</h2>

        <p id="userEmail">almas@example.com</p>

        <span class="role">
            Frontend Developer
        </span>

        <button id="editBtn">
            <i class="fas fa-edit"></i>
            Edit Profile
        </button>

    </div>

    <div class="stats">

        <div class="stat-card">

            <h2>120</h2>

            <p>Questions Solved</p>

        </div>

        <div class="stat-card">

            <h2>18</h2>

            <p>Quizzes Completed</p>

        </div>

        <div class="stat-card">

            <h2>6</h2>

            <p>Mock Interviews</p>

        </div>

        <div class="stat-card">

            <h2>15🔥</h2>

            <p>Day Streak</p>

        </div>

    </div>

</section>

<div class="back-container">

    <a href="javascript:history.back()" class="back-btn">

        <i class="fas fa-arrow-left"></i>

        Back

    </a>

</div>

<script src="../JS/profile.js"></script>

</body>

</html>
