<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | PrepWise</title>

    <link rel="stylesheet" href="../CSS/contact.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

    <nav class="navbar">

        <h2 class="logo">PrepWise</h2>

        <ul class="nav-links">

            <li><a href="../html/index.html">Home</a></li>

            <li><a href="../html/dashboard.html">Dashboard</a></li>

            <li><a href="../html/questions.html">Questions</a></li>

            <li><a href="../html/quiz.html">Quiz</a></li>

            <li><a href="../html/roadmap.html">Roadmap</a></li>

            <li><a href="../html/about.html">About</a></li>

            <li><a href="../html/profile.html">Profile</a></li>

        </ul>

    </nav>

</header>

<section class="contact">

    <div class="contact-card">

        <h1>Contact Us</h1>

        <p>
            We'd love to hear from you. Fill out the form below and we'll get back to you.
        </p>

        <form id="contactForm">

            <div class="input-group">

                <label for="name">Full Name</label>

                <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required>

            </div>

            <div class="input-group">

                <label for="email">Email</label>

                <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

            </div>

            <div class="input-group">

                <label for="subject">Subject</label>

                <input
                type="text"
                id="subject"
                placeholder="Enter subject"
                required>

            </div>

            <div class="input-group">

                <label for="message">Message</label>

                <textarea
                id="message"
                rows="6"
                placeholder="Write your message..."
                required></textarea>

            </div>

            <button type="submit">

                <i class="fas fa-paper-plane"></i>

                Send Message

            </button>

        </form>

    </div>

</section>
<div class="back-container">

    <a href="javascript:history.back()" class="back-btn">

        <i class="fas fa-arrow-left"></i>

        Back

    </a>

</div>

<script src="../JS/contact.js"></script>

</body>

</html>
